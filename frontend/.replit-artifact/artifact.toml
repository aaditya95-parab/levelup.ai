kind = "web"
previewPath = "/"
title = "LevelUp Dashboard"
version = "1.0.0"
id = "frontend"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20769

[services.development]
run = "cd frontend && npm run dev"

[services.production]
build = [ "npm", "--prefix", "frontend", "run", "build" ]
publicDir = "frontend/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20769"
BASE_PATH = "/"
